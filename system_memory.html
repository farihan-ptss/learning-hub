    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Simulated Data for Interactive Learning Elements
        const MEMORY_TYPES_INFO = {
            register: {

                analogy: "Tangan CPU",
                desc: "Menyimpan data yang sedang diproses. CPU memegang data ini sekarang.",

                speed: "⭐ (Perlahan)",
                size: "Sangat Besar (Terabait)",
                cost: "Paling Murah",
                volatile: "Tidak (Kekal / Non-Volatile)",
                bg: "bg-slate-100 border-slate-300 text-slate-700",
                icon: "fa-database"
            }
        };

        const QUIZ_QUESTIONS = [
            {
                id: 1,
                question: "Di manakah program Microsoft Word diletakkan SEBELUM ia dibuka oleh pengguna?",
                options: [
                    { key: "A", text: "Di dalam RAM" },
                    { key: "B", text: "Di dalam SSD/HDD" },
                    { key: "C", text: "Di dalam Cache L1" },
                    { key: "D", text: "Di dalam Register" }
                ],
                correct: "B",
                explanation: "Sebelum dibuka, program disimpan secara kekal dalam storan sekunder (SSD/HDD). Apabila dibuka, barulah ia dipindahkan ke RAM."
            },
            {
                id: 2,
                question: "Berdasarkan analogi meja belajar, apakah yang diwakili oleh RAM?",
                options: [
                    { key: "A", text: "Almari buku di sudut bilik" },
                    { key: "B", text: "Otak pelajar" },
                    { key: "C", text: "Meja belajar di mana buku diletakkan semasa dibaca" },
                    { key: "D", text: "Stor di luar rumah" }
                ],
                correct: "C",
                explanation: "RAM dianalogikan sebagai Meja Belajar kerana ia memegang data/buku yang sedang aktif digunakan sekarang supaya senang diakses oleh otak (CPU)."
            },
            {
                id: 3,
                question: "Apakah jenis memori yang paling hampir dengan CPU, paling laju, paling kecil saiznya dan paling mahal harganya?",
                options: [
                    { key: "A", text: "RAM" },
                    { key: "B", text: "SSD" },
                    { key: "C", text: "Cache L3" },
                    { key: "D", text: "Register" }
                ],
                correct: "D",
                explanation: "Register terletak di dalam CPU sendiri. Ia merupakan memori paling laju, paling kecil, dan paling mahal dalam hierarki memori."
            },
            {
                id: 4,
                question: "Kenapa RAM dipanggil volatile memory?",
                options: [
                    { key: "A", text: "Kerana semua data di dalamnya akan hilang apabila komputer dimatikan." },
                    { key: "B", text: "Kerana harganya sangat mahal di pasaran." },
                    { key: "C", text: "Kerana ia menyimpan BIOS secara kekal." },
                    { key: "D", text: "Kerana data boleh ditulis berkali-kali tanpa kuasa elektrik." }
                ],
                correct: "A",
                explanation: "Volatile bermaksud sementara. Memori jenis ini memerlukan kuasa elektrik untuk mengekalkan data; sebaik sahaja dimatikan, datanya akan terpadam sepenuhnya."
            },
            {
                id: 5,
                question: "Jika CPU seorang Chef, manakah padanan analogi Cache L1 yang paling tepat?",
                options: [
                    { key: "A", text: "Bahan masakan di dalam peti sejuk" },
                    { key: "B", text: "Bahan masakan yang sedang dipegang di tangan chef" },
                    { key: "C", text: "Bahan masakan di atas meja dapur" },
                    { key: "D", text: "Bahan masakan di dalam stor belakang rumah" }
                ],
                correct: "B",
                explanation: "Cache L1 berada paling hampir dengan CPU core, sama seperti bahan masakan yang berada betul-betul di tangan chef untuk digunakan serta-merta."
            },
            {
                id: 6,
                question: "Apakah fungsi utama Cache Memory di antara CPU dan RAM?",
                options: [
                    { key: "A", text: "Menyimpan fail video bersaiz besar untuk dimainkan semula" },
                    { key: "B", text: "Menyimpan firmware komputer (BIOS)" },
                    { key: "C", text: "Menyimpan data yang kerap digunakan oleh CPU bagi melajukan pemprosesan" },
                    { key: "D", text: "Menggantikan terus peranan SSD secara kekal" }
                ],
                correct: "C",
                explanation: "Cache menyimpan salinan data daripada RAM yang kerap digunakan semula, supaya CPU tidak perlu kerap berjalan jauh ke RAM yang lebih perlahan."
            },
            {
                id: 7,
                question: "Apakah urutan carian data yang betul apabila CPU memerlukan sesuatu maklumat?",
                options: [
                    { key: "A", text: "RAM → L3 → L2 → L1 → CPU" },
                    { key: "B", text: "CPU → RAM → L1 → L2 → L3" },
                    { key: "C", text: "CPU → L1 → L2 → L3 → RAM" },
                    { key: "D", text: "L3 → L2 → L1 → RAM → CPU" }
                ],
                correct: "C",
                explanation: "Urutannya bermula daripada yang paling hampir dan laju: CPU menyemak L1 Cache, kemudian L2, kemudian L3, dan jika masih tiada (Cache Miss), barulah ia mencari di dalam RAM."
            }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('home'); // home, sys-memory, cache-memory, simulator, quiz
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedHierarchy, setSelectedHierarchy] = useState('register');
            
            // Simulator State
            const [simState, setSimState] = useState('idle'); // idle, fetching_l1, fetching_l2, fetching_l3, fetching_ram, found
            const [simLocation, setSimLocation] = useState('');
            const [simLogs, setSimLogs] = useState([]);
            const [simItem, setSimItem] = useState('Garam (Data Kerap)'); // Garam (L1), Bawang (L2), Kicap (L3), Telur (RAM)

            // Quiz State
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [quizAnswers, setQuizAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);
            const [score, setScore] = useState(0);

            // Toast/Alert message simulation
            const [toastMessage, setToastMessage] = useState(null);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => {
                    setToastMessage(null);
                }, 3000);
            };

            // Reset simulator
            const resetSimulator = () => {
                setSimState('idle');
                setSimLocation('');
                setSimLogs([]);
            };

            // Run Kitchen Cache Simulation
            const runSimulator = (target) => {
                resetSimulator();
                setSimItem(target);
                setSimState('running');
                
                let logs = [];
                const addLog = (text, delay) => {
                    return new Promise((resolve) => {
                        setTimeout(() => {
                            logs = [...logs, text];
                            setSimLogs([...logs]);
                            resolve();
                        }, delay);
                    });
                };

                // L1 Check
                addLog("🔍 CPU (Chef) mula mencari bahan: " + target, 500)
                    .then(() => {
                        setSimLocation('l1');
                        return addLog("👉 Menyemak L1 Cache (Bahan di tangan)...", 1000);
                    })
                    .then(() => {
                        if (target === 'Sudu Masak (L1 Data)') {
                            setSimLocation('l1-found');
                            setSimState('found');
                            return addLog("🎯 DIJUMPAI di L1 Cache! Sangat Laju (0.5 ns). Tiada lengahan.", 800);
                        } else {
                            return addLog("❌ Tiada di L1 Cache (L1 Miss). Teruskan carian...", 1000);
                        }
                    })
                    .then(() => {
                        if (simState === 'found' || target === 'Sudu Masak (L1 Data)') return;
                        setSimLocation('l2');
                        return addLog("👉 Menyemak L2 Cache (Bahan atas meja)...", 1000);
                    })
                    .then(() => {
                        if (simState === 'found' || target === 'Sudu Masak (L1 Data)') return;
                        if (target === 'Bawang Dipotong (L2 Data)') {
                            setSimLocation('l2-found');
                            setSimState('found');
                            return addLog("🎯 DIJUMPAI di L2 Cache! Cepat dan cekap (2 ns).", 800);
                        } else {
                            return addLog("❌ Tiada di L2 Cache (L2 Miss). Teruskan carian...", 1000);
                        }
                    })
                    .then(() => {
                        if (simState === 'found' || target === 'Sudu Masak (L1 Data)' || target === 'Bawang Dipotong (L2 Data)') return;
                        setSimLocation('l3');
                        return addLog("👉 Menyemak L3 Cache (Bahan di rak dapur - kongsi core)...", 1000);
                    })
                    .then(() => {
                        if (simState === 'found' || target === 'Sudu Masak (L1 Data)' || target === 'Bawang Dipotong (L2 Data)') return;
                        if (target === 'Kicap Manis (L3 Data)') {
                            setSimLocation('l3-found');
                            setSimState('found');
                            return addLog("🎯 DIJUMPAI di L3 Cache! Sederhana laju (10 ns). Masih jimat masa.", 800);
                        } else {
                            return addLog("❌ Tiada di L3 Cache (L3 Miss). Terpaksa keluar ke RAM...", 1000);
                        }
                    })
                    .then(() => {
                        if (simState === 'found' || target !== 'Telur Mentah (RAM Data)') return;
                        setSimLocation('ram');
                        return addLog("🏃‍♂️ Berjalan ke RAM (Peti Sejuk jauh)...", 1200);
                    })
                    .then(() => {
                        if (simState === 'found' || target !== 'Telur Mentah (RAM Data)') return;
                        setSimLocation('ram-found');
                        setSimState('found');
                        return addLog("🎯 Akhirnya DIJUMPAI di RAM! Mengambil masa lebih lama (100 ns). Lambat sedikit tetapi data berjaya dibaca.", 1000);
                    });
            };

            // Quiz logic
            const handleAnswerSelect = (optionKey) => {
                setQuizAnswers({
                    ...quizAnswers,
                    [currentQuestion]: optionKey
                });
            };

            const nextQuestion = () => {
                if (currentQuestion < QUIZ_QUESTIONS.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    // Calculate score
                    let totalScore = 0;
                    QUIZ_QUESTIONS.forEach((q, idx) => {
                        if (quizAnswers[idx] === q.correct) {
                            totalScore += 1;
                        }
                    });
                    setScore(totalScore);
                    setShowResults(true);
                }
            };

            const prevQuestion = () => {
                if (currentQuestion > 0) {
                    setCurrentQuestion(currentQuestion - 1);
                }
            };

            const resetQuiz = () => {
                setCurrentQuestion(0);
                setQuizAnswers({});
                setShowResults(false);
                setScore(0);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Nav */}
                    <header className="sticky top-0 z-50 bg-white border-b border-slate-100 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setActiveTab('home')}>
                                    <div className="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center text-white shadow-md">
                                        <i className="fa-solid fa-graduation-cap text-lg"></i>
                                    </div>
                                    <div>
                                        <span className="font-extrabold text-slate-800 text-lg tracking-tight block">MemoryHub</span>
                                        <span className="text-xs text-sky-600 font-semibold block uppercase tracking-wider">Computer Architecture</span>
                                    </div>
                                </div>
                                
                                {/* Desktop Menu Nav */}
                                <nav className="hidden md:flex space-x-1">
                                    <button 
                                        onClick={() => setActiveTab('home')}
                                        className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 ${activeTab === 'home' ? 'bg-sky-50 text-sky-600' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-50'}`}
                                    >
                                        <i className="fa-solid fa-house mr-1.5"></i> Utama
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('sys-memory')}
                                        className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 ${activeTab === 'sys-memory' ? 'bg-sky-50 text-sky-600' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-50'}`}
                                    >
                                        <i className="fa-solid fa-server mr-1.5"></i> System Memory
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('cache-memory')}
                                        className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 ${activeTab === 'cache-memory' ? 'bg-sky-50 text-sky-600' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-50'}`}
                                    >
                                        <i className="fa-solid fa-bolt mr-1.5"></i> Cache Memory
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('simulator')}
                                        className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 ${activeTab === 'simulator' ? 'bg-sky-50 text-sky-600' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-50'}`}
                                    >
                                        <i className="fa-solid fa-gamepad mr-1.5"></i> Simulasi Chef
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('quiz')}
                                        className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 ${activeTab === 'quiz' ? 'bg-sky-50 text-sky-600' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-50'}`}
                                    >
                                        <i className="fa-solid fa-circle-question mr-1.5"></i> Kuiz Minda
                                    </button>
                                </nav>

                                {/* Responsive Badge / Contact */}
                                <div className="flex items-center space-x-2">
                                    <span className="hidden lg:inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-800">
                                        <span className="w-1.5 h-1.5 mr-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                        Belajar Cepat
                                    </span>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Mobile Navigation Bar */}
                    <div className="md:hidden bg-white border-b border-slate-200 px-4 py-2 flex space-x-1 overflow-x-auto no-scrollbar">
                        <button 
                            onClick={() => setActiveTab('home')}
                            className={`flex-none px-3 py-1.5 rounded-lg text-xs font-bold ${activeTab === 'home' ? 'bg-sky-600 text-white' : 'bg-slate-100 text-slate-600'}`}
                        >
                            <i className="fa-solid fa-house mr-1"></i> Utama
                        </button>
                        <button 
                            onClick={() => setActiveTab('sys-memory')}
                            className={`flex-none px-3 py-1.5 rounded-lg text-xs font-bold ${activeTab === 'sys-memory' ? 'bg-sky-600 text-white' : 'bg-slate-100 text-slate-600'}`}
                        >
                            <i className="fa-solid fa-server mr-1"></i> System Memory
                        </button>
                        <button 
                            onClick={() => setActiveTab('cache-memory')}
                            className={`flex-none px-3 py-1.5 rounded-lg text-xs font-bold ${activeTab === 'cache-memory' ? 'bg-sky-600 text-white' : 'bg-slate-100 text-slate-600'}`}
                        >
                            <i className="fa-solid fa-bolt mr-1"></i> Cache Memory
                        </button>
                        <button 
                            onClick={() => setActiveTab('simulator')}
                            className={`flex-none px-3 py-1.5 rounded-lg text-xs font-bold ${activeTab === 'simulator' ? 'bg-sky-600 text-white' : 'bg-slate-100 text-slate-600'}`}
                        >
                            <i className="fa-solid fa-gamepad mr-1"></i> Chef Sim
                        </button>
                        <button 
                            onClick={() => setActiveTab('quiz')}
                            className={`flex-none px-3 py-1.5 rounded-lg text-xs font-bold ${activeTab === 'quiz' ? 'bg-sky-600 text-white' : 'bg-slate-100 text-slate-600'}`}
                        >
                            <i className="fa-solid fa-circle-question mr-1"></i> Kuiz
                        </button>
                    </div>

                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="fixed bottom-5 right-5 z-50 bg-slate-900 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-3 animate-bounce">
                            <i className="fa-solid fa-bell text-sky-400"></i>
                            <span className="text-sm font-medium">{toastMessage}</span>
                        </div>
                    )}

                    {}
                    <main className="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6">
                        {activeTab === 'home' && (
                            <div className="space-y-8 animate-fadeIn">
                                {/* Hero Banner */}
                                <div className="relative rounded-3xl overflow-hidden gradient-bg text-white p-8 md:p-12 custom-shadow">
                                    <div className="absolute top-0 right-0 w-96 h-96 bg-white/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
                                    <div className="absolute bottom-0 left-0 w-64 h-64 bg-sky-500/30 rounded-full blur-2xl -ml-20 -mb-20"></div>
                                    
                                    <div className="relative max-w-2xl space-y-4">
                                        <div className="inline-flex items-center px-3 py-1 rounded-full bg-white/20 text-sky-100 text-xs font-bold uppercase tracking-wider">
                                            💻 Pengenalan Computer Architecture
                                        </div>
                                        <h1 className="text-3xl md:text-5xl font-extrabold leading-tight tracking-tight">
                                            Kuasai System Memory & Cache dengan Mudah!
                                        </h1>
                                        <p className="text-sky-100 text-sm md:text-base font-medium">
                                            Selamat datang ke Hub Pembelajaran interaktif. Melalui visualisasi interaktif dan analogi dunia sebenar (Chef masakan & Meja belajar), anda akan faham bagaimana komputer memproses data sepantas kilat!
                                        </p>
                                        <div className="pt-4 flex flex-wrap gap-3">
                                            <button 
                                                onClick={() => setActiveTab('sys-memory')}
                                                className="px-6 py-3 rounded-xl bg-white text-sky-700 font-bold hover:bg-sky-50 transition shadow-lg text-sm"
                                            >
                                                Mula Belajar
                                            </button>
                                            <button 
                                                onClick={() => setActiveTab('simulator')}
                                                className="px-6 py-3 rounded-xl bg-sky-500/40 border border-white/20 text-white font-bold hover:bg-sky-500/60 transition text-sm flex items-center"
                                            >
                                                <i className="fa-solid fa-play mr-2"></i> Cuba Simulasi Chef
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Quick Analogy Highlighters */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {/* System Memory Analogy Box */}
                                    <div className="bg-white rounded-2xl p-6 border border-slate-100 custom-shadow hover:scale-[1.01] transition-transform">
                                        <div className="flex items-center space-x-3 mb-4">
                                            <div className="w-12 h-12 rounded-xl bg-sky-50 flex items-center justify-center text-sky-600">
                                                <i className="fa-solid fa-book-open text-xl"></i>
                                            </div>
                                            <div>
                                                <span className="text-xs font-bold text-sky-600 uppercase">Analogi Meja Belajar</span>
                                                <h3 className="text-lg font-bold text-slate-800">Bagaimana RAM Berfungsi?</h3>
                                            </div>
                                        </div>
                                        <p className="text-slate-600 text-sm leading-relaxed mb-4">

                                                            <p>Jawapan Anda: <strong className={isCorrect ? 'text-emerald-600' : 'text-rose-600'}>{quizAnswers[idx]}</strong></p>
                                                            <p>Jawapan Betul: <strong className="text-emerald-600">{q.correct}</strong></p>
                                                        </div>
                                                        <p className="text-xs text-slate-500 bg-white p-3 rounded-xl border border-slate-100 font-semibold leading-relaxed">
                                                            💡 <strong>Huraian:</strong> {q.explanation}
                                                        </p>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer - Professional, cleanly styled */}
                    <footer className="bg-slate-900 text-slate-400 py-10 mt-12 border-t border-slate-800">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-y-4">
                            <div className="flex items-center justify-center space-x-2">
                                <div className="w-8 h-8 rounded-lg gradient-bg flex items-center justify-center text-white shadow-md">
                                    <i className="fa-solid fa-graduation-cap text-sm"></i>
                                </div>
                                <span className="font-extrabold text-white text-md tracking-tight">MemoryHub</span>
                            </div>
                            <p className="text-xs max-w-md mx-auto leading-relaxed">
                                Dioptimumkan untuk membantu pelajar memahami topik Struktur Hierarki Memori, Register, Cache L1/L2/L3, ROM & RAM secara visual dan intuitif.
                            </p>
                            <div className="pt-4 border-t border-slate-800 text-xs font-semibold text-slate-500">
                                hak milik : 2026@ Pn Farihan Elyana binti Zahari
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
